[build]
rustflags = ["-C", "target-feature=+crt-static"]

[env]
# LLVM/libclang 路径，指向项目本地安装的 LLVM
# relative = true 是相对于 Cargo.toml 所在目录 (src-tauri/)
LIBCLANG_PATH = { value = ".llvm/bin", relative = true }

# CMake 路径，指向项目本地安装的 CMake
CMAKE = { value = ".cmake/bin/cmake.exe", relative = true }

# 使用 Ninja 作为 CMake 生成器（避免 VS 版本兼容问题）
CMAKE_GENERATOR = "Ninja"

# Ninja 可执行文件路径
CMAKE_MAKE_PROGRAM = { value = ".ninja/ninja.exe", relative = true }
